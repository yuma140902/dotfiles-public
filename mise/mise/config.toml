[settings]
disable_backends = ["asdf"]
idiomatic_version_file_enable_tools = []
minimum_release_age = "7d"

[settings.cargo]
binstall = false

[settings.python]
compile = false

[tools]
"aqua:BurntSushi/ripgrep" = "15.1.0"
"aqua:ajeetdsouza/zoxide" = "0.10.0"
"aqua:astral-sh/uv" = "0.11.28"
"aqua:chmln/sd" = "1.1.0"
"aqua:cli/cli" = "2.96.0"
"aqua:fastfetch-cli/fastfetch" = "2.65.2"
"aqua:jqlang/jq" = "1.8.1"
"aqua:junegunn/fzf" = "0.74.0"
"aqua:k1LoW/git-wt" = "0.29.0"
"aqua:lima-vm/lima" = { version = "2.1.4", os = ["macos"] }
"aqua:lsd-rs/lsd" = "1.2.0"
"aqua:openai/codex" = { version = "0.144.1", os = ["linux", "macos"] }
"aqua:pnpm/pnpm" = "11.10.0"
"aqua:sharkdp/bat" = "0.26.1"
"aqua:sharkdp/fd" = "10.4.2"
"aqua:topgrade-rs/topgrade" = "17.6.2"
"aqua:tree-sitter/tree-sitter" = "0.26.10"
"aqua:x-motemen/ghq" = "1.10.1"
"cargo:cargo-audit" = "0.22.1"
"cargo:random-output" = "0.3.1"
"cargo:tealdeer" = "1.8.1"
"cargo:tokei" = "14.0.0"
"github:psmux/psmux" = { version = "3.3.6", os = ["windows"] }
"npm:tiged" = "2.12.8"
"npm:trash-cli" = { version = "7.2.0", os = ["windows"] }
"pipx:trash-cli" = { version = "0.24.5.26", os = ["linux", "macos"] }
"vfox:mise-plugins/vfox-neovim" = "0.12.2"
node = "25.9.0"
python = "3.14.6"
rust = { version = "1.97.0", components = "rust-src,rust-analyzer" }

[bootstrap.packages]
# brew backend ではバージョン指定がまだサポートされていないので仕方なく latest を指定する
"brew:gcc" = "latest"
"brew:git" = "latest"
"brew:git-lfs" = "latest"
"brew:htop" = "latest"
"brew:mise" = "latest"
"brew:tig" = "latest"
"brew:tmux" = "latest"
"brew:wget" = "latest"
"brew:zstd" = "latest"
